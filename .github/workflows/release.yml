name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOCKER_REPOSITORY: networlddev/dockerupdateguard
  DOCKERFILE_PATH: src/DockerUpdateGuard/Dockerfile

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore DockerUpdateGuard.slnx

      - name: Build
        run: dotnet build DockerUpdateGuard.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test DockerUpdateGuard.slnx
          -c Release --no-build
          --logger trx
          --results-directory ${{ runner.temp }}/TestResults

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract base runtime digest
        id: basedigest
        run: |
          docker pull mcr.microsoft.com/dotnet/runtime:10.0-alpine
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' mcr.microsoft.com/dotnet/runtime:10.0-alpine)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build & push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BASE_RUNTIME_DIGEST=${{ steps.basedigest.outputs.digest }}
          tags: |
            ${{ env.DOCKER_REPOSITORY }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_REPOSITORY }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Docker image: `${{ env.DOCKER_REPOSITORY }}:${{ steps.version.outputs.version }}`
