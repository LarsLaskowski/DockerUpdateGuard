name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOCKER_REPOSITORY: networlddev/dockerupdateguard
  DOCKERFILE_PATH: src/DockerUpdateGuard/Dockerfile

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore DockerUpdateGuard.slnx

      - name: Build
        run: dotnet build DockerUpdateGuard.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test DockerUpdateGuard.slnx
          -c Release --no-build
          --logger trx
          --results-directory ${{ runner.temp }}/TestResults

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract base runtime digest
        id: basedigest
        run: |
          docker pull mcr.microsoft.com/dotnet/runtime:10.0-alpine
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' mcr.microsoft.com/dotnet/runtime:10.0-alpine)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BASE_RUNTIME_DIGEST=${{ steps.basedigest.outputs.digest }}
          tags: |
            ${{ env.DOCKER_REPOSITORY }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_REPOSITORY }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Docker image: `${{ env.DOCKER_REPOSITORY }}:${{ steps.version.outputs.version }}`
