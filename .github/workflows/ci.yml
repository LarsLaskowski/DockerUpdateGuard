name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore DockerUpdateGuard.slnx

      - name: Build
        run: dotnet build DockerUpdateGuard.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test DockerUpdateGuard.slnx
          -c Release --no-build
          --logger trx
          --collect:"XPlat Code Coverage"
          --results-directory ${{ runner.temp }}/TestResults

      - name: Publish test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: dotnet tests
          path: ${{ runner.temp }}/TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload test & coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            ${{ runner.temp }}/TestResults/**/*.trx
            ${{ runner.temp }}/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
