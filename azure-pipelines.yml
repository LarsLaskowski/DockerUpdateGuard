trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  versionPrefix: '1.0'
  versionCounter: $[counter(variables['versionPrefix'], 1)]
  appVersion: $[format('{0}.{1}', variables['versionPrefix'], variables['versionCounter'])]
  dockerRepository: 'networlddev/dockerupdateguard'
  dockerfilePath: 'src/DockerUpdateGuard/Dockerfile'
  buildConfiguration: 'Release'

name: $[format('{0}.{1}', variables['versionPrefix'], variables['versionCounter'])]

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Test & Publish'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'
              includePreviewVersions: true

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: 'DockerUpdateGuard.slnx'

          - task: DotNetCoreCLI@2
            displayName: 'Build solution'
            inputs:
              command: 'build'
              projects: 'DockerUpdateGuard.slnx'
              arguments: '-c $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run tests'
            inputs:
              command: 'test'
              projects: 'src/Tests/**/*.csproj'
              arguments: '-c $(buildConfiguration) --no-build --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults'
              publishTestResults: false

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

  - stage: Docker
    displayName: 'Docker Build & Push'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DockerBuildPush
        displayName: 'Build & Push Docker Image'
        steps:
          - task: Docker@2
            displayName: 'Docker login'
            inputs:
              command: login
              containerRegistry: 'DockerHub'

          - script: |
              docker build -f $(dockerfilePath) --build-arg APP_VERSION=$(appVersion) -t $(dockerRepository):$(appVersion) -t $(dockerRepository):latest $(Build.SourcesDirectory)
              docker push $(dockerRepository):$(appVersion)
              docker push $(dockerRepository):latest
            displayName: 'Build & Push image'

         - task: Docker@2
           displayName: 'Docker logout'
           inputs:
             command: 'logout'
             containerRegistry: 'DockerHub'
